<h2 mat-dialog-title>Carrito #{{ data.id }} — Usuario {{ data.userId }}</h2>

<mat-dialog-content>
  <table mat-table [dataSource]="data.products" class="detail-table">
    <ng-container matColumnDef="title">
      <th mat-header-cell *matHeaderCellDef>Producto</th>
      <td mat-cell *matCellDef="let p" class="title-cell">{{ p.title }}</td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef>Precio unit.</th>
      <td mat-cell *matCellDef="let p">{{ p.price | currency: 'USD' }}</td>
    </ng-container>

    <ng-container matColumnDef="quantity">
      <th mat-header-cell *matHeaderCellDef>Cantidad</th>
      <td mat-cell *matCellDef="let p" class="qty-cell">{{ p.quantity }}</td>
    </ng-container>

    <ng-container matColumnDef="subtotal">
      <th mat-header-cell *matHeaderCellDef>Subtotal</th>
      <td mat-cell *matCellDef="let p" class="price">
        {{ p.price * p.quantity | currency: 'USD' }}
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button
    mat-flat-button
    type="button"
    [style]="'background-color: #4f47a8; color: white;'"
    mat-dialog-close
  >
    Cerrar
  </button>
</mat-dialog-actions>
